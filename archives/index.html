	<script>
		// 更新日期和时间
		function updateDateTime() {
			const now = new Date();
			const options = {
				year: 'numeric',
				month: '2-digit',
				day: '2-digit',
				hour: '2-digit',
				minute: '2-digit',
				second: '2-digit',
				hour12: false
			};
			const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
			const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
			document.getElementById('kira-date-time').innerHTML = `
				<div class="kira-date">${dateStr}</div>
				<div class="kira-time">${timeStr}</div>
			`;
		}

		// 获取IP地址和位置信息
		function getIPInfo() {
			// 尝试多个IP获取API
			const ipAPIs = [
				'https://api.ipify.org?format=json',
				'https://ifconfig.me/ip',
				'https://api.myip.com'
			];

			// 尝试获取IP地址
			function tryGetIP(index) {
				if (index >= ipAPIs.length) {
					// 所有API都失败了
					document.getElementById('kira-ip-info').innerHTML = `
						<div class="kira-ip">IP: 获取失败</div>
						<div class="kira-location">位置信息获取失败</div>
					`;
					return;
				}

				const api = ipAPIs[index];

				if (api === 'https://ifconfig.me/ip') {
					// 这个API返回纯文本IP
					fetch(api)
						.then(response => response.text())
						.then(ip => {
							ip = ip.trim();
							getLocation(ip);
						})
						.catch(err => {
							tryGetIP(index + 1);
						});
				} else {
					// 其他API返回JSON
					fetch(api)
						.then(response => response.json())
						.then(data => {
							const ip = data.ip || data.ip_address;
							if (ip) {
								getLocation(ip);
							} else {
								throw new Error('No IP found');
							}
						})
						.catch(err => {
							tryGetIP(index + 1);
						});
				}
			}

			// 获取位置信息
			function getLocation(ip) {
				// 尝试多个位置信息API
				const locationAPIs = [
					`https://ipapi.co/${ip}/json/`,
					`https://ipinfo.io/${ip}/json`,
					`https://api.ipstack.com/${ip}?access_key=4101b9939e0c507a3e410f38f0707d39`
				];

				function tryGetLocation(index) {
				if (index >= locationAPIs.length) {
					// 所有API都失败了
					document.getElementById('kira-ip-info').innerHTML = `
						<div class="kira-ip">IP: ${ip}</div>
						<div class="kira-location">位置信息获取失败</div>
					`;
					return;
				}

				const api = locationAPIs[index];
				fetch(api)
					.then(response => response.json())
					.then(locationData => {
						const city = locationData.city || locationData.region || '未知城市';
						const lat = locationData.latitude || locationData.lat;
						const lon = locationData.longitude || locationData.lon;
						document.getElementById('kira-ip-info').innerHTML = `
							<div class="kira-ip">IP: ${ip}</div>
							<div class="kira-location">${city}</div>
						`;
						// 获取天气信息
						if (lat && lon) {
							getWeatherInfo(lat, lon);
						}
					})
					.catch(err => {
						tryGetLocation(index + 1);
					});
			}

				tryGetLocation(0);
			}

			// 开始尝试获取IP
			tryGetIP(0);
		}

		// 获取天气信息
		function getWeatherInfo(lat, lon) {
			// 使用OpenWeatherMap API获取天气信息
			const apiKey = 'd7c4b7c3a788041c0e8d2f2a4f62c9b5';
			const weatherApi = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=zh_cn`;

			fetch(weatherApi)
				.then(response => response.json())
				.then(data => {
					const weather = data.weather[0].description;
					const temperature = Math.round(data.main.temp);
					const humidity = data.main.humidity;
					document.getElementById('kira-weather-info').innerHTML = `
						<div class="kira-weather">${weather}</div>
						<div class="kira-temperature">${temperature}°C</div>
						<div class="kira-humidity">湿度: ${humidity}%</div>
					`;
				})
				.catch(err => {
					document.getElementById('kira-weather-info').innerHTML = `
						<div class="kira-weather">天气获取失败</div>
					`;
				});
		}

		// 初始化
		updateDateTime();
		getIPInfo();
		
		// 每秒更新时间
		setInterval(updateDateTime, 1000);
	</script>
